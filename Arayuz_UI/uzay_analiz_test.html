<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 AI Destekli Uzay Hava Durumu Analizi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #00f3ff;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }

        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .ai-badge {
            display: inline-block;
            background: linear-gradient(135deg, #b84dff 0%, #ff6600 100%);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            margin-left: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 10px;
            padding: 20px;
        }

        .panel h2 {
            color: #00f3ff;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #a0aec0;
            font-size: 0.9em;
        }

        input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 5px;
            color: #fff;
            font-size: 1em;
        }

        input:focus {
            outline: none;
            border-color: #00f3ff;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00f3ff 0%, #0099cc 100%);
            border: none;
            border-radius: 5px;
            color: #000;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 243, 255, 0.5);
        }

        .result {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
            padding: 15px;
            margin-top: 10px;
        }

        .result-item {
            margin-bottom: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid #00f3ff;
            border-radius: 3px;
        }

        .result-label {
            color: #00f3ff;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .result-value {
            color: #e0e0e0;
        }

        .risk-DÜŞÜK { border-left-color: #00ff88; }
        .risk-ORTA { border-left-color: #ffcc00; }
        .risk-YÜKSEK { border-left-color: #ff6600; }
        .risk-KRİTİK { border-left-color: #ff003c; }

        .json-output {
            background: #000;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: #00ff88;
        }

        .ai-section {
            background: rgba(184, 77, 255, 0.1);
            border: 1px solid rgba(184, 77, 255, 0.3);
            border-radius: 5px;
            padding: 15px;
            margin-top: 15px;
        }

        .ai-section h3 {
            color: #b84dff;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .trend-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.85em;
            margin: 5px 5px 5px 0;
            font-weight: bold;
        }

        .trend-STABIL { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .trend-ARTIŞ { background: rgba(255, 204, 0, 0.2); color: #ffcc00; }
        .trend-DÜŞÜŞ { background: rgba(0, 243, 255, 0.2); color: #00f3ff; }
        .trend-HIZLI { background: rgba(255, 0, 60, 0.2); color: #ff003c; }

        .prediction {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }

        .prediction-label {
            color: #b84dff;
            font-weight: bold;
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 Uzay Hava Durumu Analiz Sistemi <span class="ai-badge">🤖 AI POWERED</span></h1>
        <p class="subtitle">Yapay Zeka Destekli Gelişmiş Analiz ve Tahmin Sistemi</p>
        
        <div class="grid">
            <div class="panel">
                <h2>📊 Veri Girişi</h2>
                
                <div class="input-group">
                    <label>Güneş Rüzgarı Hızı (km/s)</label>
                    <input type="number" id="ruzgar_hizi" value="450" step="0.1">
                </div>

                <div class="input-group">
                    <label>Plazma Yoğunluğu (p/cm³)</label>
                    <input type="number" id="plazma_yogunlugu" value="8.5" step="0.1">
                </div>

                <div class="input-group">
                    <label>Manyetik Alan Bt (nT)</label>
                    <input type="number" id="bt_gucu" value="6.2" step="0.1">
                </div>

                <div class="input-group">
                    <label>Manyetik Alan Bz (nT)</label>
                    <input type="number" id="bz_yonu" value="-3.1" step="0.1">
                </div>

                <div class="input-group">
                    <label>Kp İndeksi</label>
                    <input type="number" id="kp_indeksi" value="3.5" step="0.1">
                </div>

                <div class="input-group">
                    <label>Proton Akısı (pfu)</label>
                    <input type="number" id="proton_akisi" value="2.4" step="0.1">
                </div>

                <div class="input-group">
                    <label>X-ray Sınıfı</label>
                    <input type="text" id="xray_sinifi" value="C2.1">
                </div>

                <div class="input-group">
                    <label>Tehdit Skoru (0-10)</label>
                    <input type="number" id="tehdit_skoru" value="3.2" step="0.1" min="0" max="10">
                </div>

                <button onclick="analizYap()">🚀 Analiz Yap</button>
            </div>

            <div class="panel">
                <h2>📈 Analiz Sonuçları</h2>
                <div id="sonuclar" class="result">
                    <p style="text-align: center; color: #718096;">Analiz yapmak için verileri girin ve butona tıklayın</p>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>💻 JSON Çıktısı</h2>
            <pre id="json-output" class="json-output">Analiz sonucu burada görünecek...</pre>
        </div>
    </div>

    <script src="uzay_analiz.js"></script>
    <script>
        function analizYap() {
            // Verileri topla
            const veriler = {
                ruzgar_hizi: parseFloat(document.getElementById('ruzgar_hizi').value),
                plazma_yogunlugu: parseFloat(document.getElementById('plazma_yogunlugu').value),
                bt_gucu: parseFloat(document.getElementById('bt_gucu').value),
                bz_yonu: parseFloat(document.getElementById('bz_yonu').value),
                kp_indeksi: parseFloat(document.getElementById('kp_indeksi').value),
                proton_akisi: parseFloat(document.getElementById('proton_akisi').value),
                xray_sinifi: document.getElementById('xray_sinifi').value,
                tehdit_skoru: parseFloat(document.getElementById('tehdit_skoru').value)
            };

            // Analiz yap
            const sonuc = uzayHavaDurumuAnalizi(veriler);

            // Sonuçları göster
            const sonuclarDiv = document.getElementById('sonuclar');
            sonuclarDiv.innerHTML = `
                <div class="result-item risk-${sonuc.risk_seviyesi}">
                    <div class="result-label">Risk Seviyesi</div>
                    <div class="result-value" style="font-size: 1.5em; font-weight: bold;">${sonuc.risk_seviyesi}</div>
                </div>

                <div class="result-item">
                    <div class="result-label">Durum Özeti</div>
                    <div class="result-value">${sonuc.yorum}</div>
                </div>

                <div class="result-item">
                    <div class="result-label">Güvenilirlik</div>
                    <div class="result-value">${sonuc.guvenilirlik}%</div>
                </div>

                <div class="result-item">
                    <div class="result-label">Öneri</div>
                    <div class="result-value">${sonuc.oneri}</div>
                </div>

                ${sonuc.detaylar.kritik_durumlar.length > 0 ? `
                <div class="result-item" style="border-left-color: #ff003c;">
                    <div class="result-label">⚠️ Kritik Durumlar</div>
                    <div class="result-value">
                        ${sonuc.detaylar.kritik_durumlar.map(d => `• ${d}`).join('<br>')}
                    </div>
                </div>
                ` : ''}

                ${sonuc.detaylar.uyarilar.length > 0 ? `
                <div class="result-item" style="border-left-color: #ffcc00;">
                    <div class="result-label">⚡ Uyarılar</div>
                    <div class="result-value">
                        ${sonuc.detaylar.uyarilar.map(u => `• ${u}`).join('<br>')}
                    </div>
                </div>
                ` : ''}

                ${sonuc.ai_analiz ? `
                <div class="ai-section">
                    <h3>🤖 Yapay Zeka Analizi</h3>
                    
                    <div style="margin-bottom: 10px;">
                        <strong>Trend Analizi:</strong><br>
                        <span class="trend-badge trend-${sonuc.ai_analiz.ruzgar_trend.includes('HIZLI') ? 'HIZLI' : sonuc.ai_analiz.ruzgar_trend}">
                            Rüzgar: ${sonuc.ai_analiz.ruzgar_trend}
                        </span>
                        <span class="trend-badge trend-${sonuc.ai_analiz.kp_trend.includes('HIZLI') ? 'HIZLI' : sonuc.ai_analiz.kp_trend}">
                            Kp: ${sonuc.ai_analiz.kp_trend}
                        </span>
                    </div>

                    ${sonuc.ai_analiz.tahminler.ruzgar ? `
                    <div class="prediction">
                        <div class="prediction-label">📊 30 Dakika Tahmini (Güneş Rüzgarı)</div>
                        <div>Mevcut: ${sonuc.ai_analiz.tahminler.ruzgar.mevcut.toFixed(1)} km/s</div>
                        <div>Tahmin: ${sonuc.ai_analiz.tahminler.ruzgar.tahmin.toFixed(1)} km/s</div>
                        <div>Değişim: ${sonuc.ai_analiz.tahminler.ruzgar.degisim > 0 ? '+' : ''}${sonuc.ai_analiz.tahminler.ruzgar.degisim.toFixed(1)} km/s</div>
                        <div>Güven: ${sonuc.ai_analiz.tahminler.ruzgar.guven.toFixed(0)}%</div>
                    </div>
                    ` : '<div style="color: #718096; font-size: 0.9em;">Tahmin için yeterli veri bekleniyor...</div>'}
                </div>
                ` : ''}
            `;

            // JSON çıktısını göster
            document.getElementById('json-output').textContent = JSON.stringify(sonuc, null, 2);
        }

        // Sayfa yüklendiğinde otomatik analiz yap
        window.addEventListener('load', () => {
            setTimeout(analizYap, 500);
        });
    </script>
</body>
</html>
