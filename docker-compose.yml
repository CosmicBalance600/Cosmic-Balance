version: '3.8'

services:
  solaris_daemon:
    build: .
    container_name: solaris_daemon_service
    env_file:
      - .env
    command: python solaris_baslat.py
    restart: always

  solaris_web:
    build: .
    container_name: solaris_web_service
    env_file:
      - .env
    ports:
      - "5000:5000"
    command: python web_sunucu.py
    depends_on:
      - solaris_daemon
    restart: always
